# Build and deploy the static export to GitHub Pages
# Site will be at https://<username>.github.io/<repo-name>/ (or .github.io root if repo is username.github.io)

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # BASE_PATH / NEXT_PUBLIC_BASE_PATH: use repo name for project pages (e.g. /jobtracker). Leave empty for user/org *.github.io repo.
      - name: Build static export
        run: npm run build:static
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          BASE_PATH: "/${{ github.event.repository.name }}"
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
